worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 20M;

    # In dev mode, services run locally on the host
    upstream users {
        server host.docker.internal:8000;
    }

    upstream budget {
        server host.docker.internal:8001;
    }

    server {
        listen 80;

        # ---- USERS SERVICE (Local: port 8000) ----
        location /api/v1/users/ {
            proxy_pass http://users/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- USERS AUTH SERVICE (Local: port 8000) ----
        location /api/v1/auth/ {
            proxy_pass http://users/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET SERVICE (Local: port 8001) ----
        location /api/v1/budgets/ {
            proxy_pass http://budget/api/v1/budgets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET LINES SERVICE (Local: port 8001) ----
        location /api/v1/budget-lines/ {
            proxy_pass http://budget/api/v1/budget-lines/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
