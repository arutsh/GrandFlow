name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend-typescript/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend-typescript/**'

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend-typescript
        run: npm ci

      - name: Run Vitest
        working-directory: ./frontend-typescript
        run: npx vitest run --coverage
