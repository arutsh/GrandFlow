name: Users Service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  users-test:
    runs-on: ubuntu-latest
    env:
      USERS_DATABASE_URL: ${{ secrets.USERS_DATABASE_URL }}
      CUSTOMER_SERVICE_URL: ${{ secrets.CUSTOMER_SERVICE_URL }}
      PYTHONPATH: ${{ github.workspace }}/services/users:${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "services/users/**"
              - "shared/**"

      - name: Set up Python
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r services/users/requirements.txt

      - name: Lint
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./services/users
        run: |
          pip install black mypy flake8
          black --check ./app
          mypy ./app
          flake8 ./app

      - name: Run tests
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./services/users
        run: python -m pytest tests/ -v
