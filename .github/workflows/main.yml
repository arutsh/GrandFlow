name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  users-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'services/users') ||
      true
    env:
      USERS_DATABASE_URL: ${{ secrets.USERS_DATABASE_URL }}
      CUSTOMER_SERVICE_URL: ${{ secrets.CUSTOMER_SERVICE_URL }}
      PYTHONPATH: ${{ github.workspace }}/services/users:${{ github.workspace }}/shared
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'services/users/**'
              - 'shared/**'

      - name: Set up Python
        if: steps.changes.outputs.src == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.changes.outputs.src == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r services/users/requirements.txt

      - name: Run tests
        if: steps.changes.outputs.src == 'true'
        working-directory: ./services/users
        run: python -m pytest tests/ -v

      - name: Lint
        if: steps.changes.outputs.src == 'true'
        working-directory: ./services/users
        run: |
          pip install black mypy flake8
          black --check ./app
          mypy ./app
          flake8 ./app

  budget-test:
    runs-on: ubuntu-latest
    env:
      BUDGET_DATABASE_URL: ${{ secrets.BUDGET_DATABASE_URL }}
      CUSTOMER_SERVICE_URL: ${{ secrets.CUSTOMER_SERVICE_URL }}
      PYTHONPATH: ${{ github.workspace }}/services/budget:${{ github.workspace }}/shared
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'services/budget/**'
              - 'shared/**'

      - name: Set up Python
        if: steps.changes.outputs.src == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.changes.outputs.src == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r services/budget/requirements.txt

      - name: Run tests
        if: steps.changes.outputs.src == 'true'
        working-directory: ./services/budget
        run: python -m pytest tests/test_budget_with_lines.py -v

      - name: Lint
        if: steps.changes.outputs.src == 'true'
        working-directory: ./services/budget
        run: |
          pip install black mypy flake8
          black --check ./app
          mypy ./app
          flake8 ./app

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'frontend-typescript/**'

      - name: Set up Node.js
        if: steps.changes.outputs.src == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.changes.outputs.src == 'true'
        working-directory: ./frontend-typescript
        run: npm ci

      - name: Run Vitest
        if: steps.changes.outputs.src == 'true'
        working-directory: ./frontend-typescript
        run: npx vitest run --coverage
