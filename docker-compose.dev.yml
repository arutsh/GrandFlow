version: "3.9"

# ============================================================
# DEV MODE: Infrastructure + Gateway only
# Frontend and backend services run on local machine
# Run with: ./dev.sh up
# ============================================================

services:
  grandflow-db:
    image: postgres:15
    container_name: grandflow-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - grandflow_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grandflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: grandflow-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Proxy (routes to local services at host.docker.internal)
  nginx:
    image: nginx:latest
    container_name: api-proxy
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - grandflow
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================================
  # MONITORING & OBSERVABILITY (Dev only)
  # ============================================================

  # Jaeger - APM for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-dev
    ports:
      - "6831:6831/udp"   # Jaeger agent (for OTel)
      - "16686:16686"     # Jaeger UI: http://localhost:16686
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_GRPC_PORT=4317
    networks:
      - grandflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - grandflow
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Grafana - Dashboard & visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dev
    ports:
      - "3002:3000"  # http://localhost:3002 (admin:admin)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - grandflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  grandflow:
    driver: bridge

volumes:
  grandflow_dev_data:
  prometheus_dev_data:
  grafana_dev_data:

# Note: In dev mode, services (users, budget) run locally on the host.
# Nginx routes to them via host.docker.internal.
# Only infrastructure (DB, Redis) runs in Docker.
# Monitoring: Jaeger (tracing), Prometheus (metrics), Grafana (dashboards)