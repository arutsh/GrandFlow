version: "3.9"

# ============================================================
# DEV MODE: Infrastructure + Gateway only
# Frontend and backend services run on local machine
# Run with: ./dev.sh up
# ============================================================

services:
  grandflow-db:
    image: postgres:15
    container_name: grandflow-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - grandflow_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grandflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Nginx Proxy (routes to local services at host.docker.internal)
  nginx:
    image: nginx:latest
    container_name: api-proxy
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - grandflow
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  grandflow:
    driver: bridge

volumes:
  grandflow_dev_data:

# Note: In dev mode, services (users, budget) run locally on the host.
# Nginx routes to them via host.docker.internal.
# Only infrastructure (DB, Redis) runs in Docker.