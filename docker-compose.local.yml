version: "3.9"
name: grandflow-local

# ============================================================
# LOCAL MODE: Full stack in Docker for non-technical users
# All services run inside Docker (infrastructure + backend + frontend)
# Run with: ./local.sh up
# ============================================================

services:
  grandflow-db:
    image: postgres:15
    container_name: grandflow-db-local
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - grandflow_local_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - grandflow

  redis:
    image: redis:7-alpine
    container_name: grandflow-redis-local
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - grandflow

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: grandflow-rabbitmq-local
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grandflow

  # Backend: Users Service
  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    container_name: users-service-local
    ports:
      - "9000:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services/users:/app
    env_file:
      - ./services/users/.env.users.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      grandflow-db:
        condition: service_healthy
    networks:
      - grandflow

  # Backend: Budget Service
  budget:
    build:
      context: .
      dockerfile: services/budget/Dockerfile
    container_name: budget-service-local
    ports:
      - "9001:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./services/budget:/app
      - ./uploads/budget:/app/uploads
    env_file:
      - ./services/budget/.env.budget.private.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      grandflow-db:
        condition: service_healthy
    networks:
      - grandflow


  # Frontend
  frontend:
    build:
      context: ./frontend-typescript
      dockerfile: Dockerfile
    container_name: frontend-local
    ports:
      - "4000:80"
    environment:
      - VITE_API_BASE=${FRONTEND_API_BASE}
    depends_on:
      - users
      - budget
    networks:
      - grandflow

  # Nginx Proxy (unified entry point)
  nginx:
    image: nginx:latest
    container_name: api-proxy-local
    ports:
      - "9082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - users
      - budget
      - frontend
    networks:
      - grandflow

networks:
  grandflow:
    driver: bridge

volumes:
  grandflow_local_data:

