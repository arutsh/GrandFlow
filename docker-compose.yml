version: "3.9"

services:
  grandflow-db:
    image: postgres:15
    container_name: grandflow-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - grandflow_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    container_name: users-service
    ports:
      - "8000:8000"   # FastAPI
      - "5678:5678"   # Debugpy
    volumes:
      - ./shared:/app/shared:ro
      - ./services/users:/app
    env_file:
      - ./services/users/.env.users.dev
    environment:
      - PYTHONPATH=/app
      - USERS_DATABASE_URL=postgresql://postgres:postgres@grandflow-db:5432/grandflow_users
    depends_on:
      - grandflow-db

  budget:
    build:
      context: .
      dockerfile: services/budget/Dockerfile
    container_name: budget-service
    ports:
      - "8001:8000"   # FastAPI
      - "5680:5680"   # Debugpy
    volumes:
      - ./shared:/app/shared:ro
      - ./services/budget:/app
      - ./uploads/budget:/app/uploads   # new volume for budget uploads
    env_file:
      - ./services/budget/.env.budget.dev
    environment:
      - PYTHONPATH=/app
      - BUDGET_DATABASE_URL=postgresql://postgres:postgres@grandflow-db:5432/grandflow_budget
    depends_on:
      - grandflow-db

  gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"   # Gateway listens on 8080
      - "5682:5682"   # Debugpy
    volumes:
      - ./shared:/app/shared:ro
      - ./api-gateway:/app
    env_file:
      - ./api-gateway/.env.gateway.dev
    depends_on:
      - users
      - budget
    environment:
      - PYTHONPATH=/app

  frontend:
      build:
        context: ./frontend-typescript
        dockerfile: Dockerfile
      container_name: frontend
      ports:
      - "3000:80"
      environment:
        - VITE_API_BASE=http://localhost:8001/api
  nginx:
    image: nginx:latest
    container_name: api-proxy
    ports:
      - "8082:80"  # expose the unified entry point on localhost
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - users
      - budget
      - frontend

  redis:
    image: redis:7-alpine
    container_name: grandflow-redis
    ports:
      - "6379:6379"

volumes:
  grandflow_data:

