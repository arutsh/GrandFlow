version: "3.9"

services:
  grandflow-db:
    image: postgres:15
    container_name: grandflow-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - grandflow_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    container_name: users-service
    ports:
      - "8000:8000"   # FastAPI
      - "5678:5678"   # Debugpy
    volumes:
      - ./shared:/app/shared:ro
      - ./services/users:/app
    env_file:
      - ./services/users/.env.users.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      - grandflow-db

  budget:
    build:
      context: .
      dockerfile: services/budget/Dockerfile
    container_name: budget-service
    ports:
      - "8001:8000"   # FastAPI
      - "5680:5680"   # Debugpy
    volumes:
      - ./shared:/app/shared:ro
      - ./services/budget:/app
      - ./uploads/budget:/app/uploads   # new volume for budget uploads
    env_file:
      - ./services/budget/.env.budget.private.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      - grandflow-db

  frontend:
      build:
        context: ./frontend-typescript
        dockerfile: Dockerfile
      container_name: frontend
      ports:
      - "3000:80"
      environment:
        - VITE_API_BASE=${FRONTEND_API_BASE:-http://localhost:8082/api}
  nginx:
    image: nginx:latest
    container_name: api-proxy
    ports:
      - "8082:80"  # expose the unified entry point on localhost
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - users
      - budget
      - frontend

  redis:
    image: redis:7-alpine
    container_name: grandflow-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: grandflow-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: grandflow-worker
    env_file:
      - ./services/worker/.env.worker.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      - rabbitmq
      - redis
      - grandflow-db
    command: celery -A celery_app worker --loglevel=info -Q ai,budget,users

  beat:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: grandflow-beat
    env_file:
      - ./services/worker/.env.worker.local
    environment:
      - PYTHONPATH=/app
    depends_on:
      - rabbitmq
      - redis
    command: celery -A celery_app beat --loglevel=info

volumes:
  grandflow_data:

